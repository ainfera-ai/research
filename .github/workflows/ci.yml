name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          config: .markdownlint-cli2.jsonc
          globs: "**/*.md"
